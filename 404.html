<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan | KazuDev</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo.png">
    
    <!-- Google Fonts: Space Grotesk for a modern tech vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind Configuration & Custom CSS -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        space: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0B0F19',
                        primary: '#3B82F6',
                        accent: '#8B5CF6'
                    },
                    animation: {
                        'spin-slow': 'spin 12s linear infinite',
                        'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0B0F19;
            overflow: hidden; /* Prevent scrolling caused by floating elements */
        }

        /* Star Background Effect */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(1px 1px at 10% 10%, white 100%, transparent),
                radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.8) 100%, transparent),
                radial-gradient(2px 2px at 50% 80%, white 100%, transparent),
                radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.6) 100%, transparent),
                radial-gradient(1px 1px at 90% 60%, white 100%, transparent);
            background-size: 200px 200px;
            animation: twinkle 10s linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0.8; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
            100% { opacity: 0.8; transform: translateY(0); }
        }

        /* Glow effects for text */
        .glow-text {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .orbit-container {
            position: relative;
            width: 280px;
            height: 280px;
        }

        @media (min-width: 768px) {
            .orbit-container {
                width: 350px;
                height: 350px;
            }
        }

        /* Rocket Signal Beam */
        .signal-beam {
            position: absolute;
            top: 50%;
            left: 100%;
            width: 40px;
            height: 40px;
            transform: translateY(-50%);
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.4);
            animation: radarPing 1.5s ease-out infinite;
        }

        @keyframes radarPing {
            0% { transform: translateY(-50%) scale(0.5); opacity: 1; }
            100% { transform: translateY(-50%) scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center relative">
    
    <!-- Background Stars -->
    <div class="stars"></div>

    <!-- Main Content Container -->
    <div class="container mx-auto px-6 relative z-10 flex flex-col lg:flex-row items-center justify-center gap-12 lg:gap-24">
        
        <!-- Animation Section (Left/Top) -->
        <div class="animate-float flex items-center justify-center">
            <div class="orbit-container flex items-center justify-center">
                
                <!-- Center Earth -->
                <div class="absolute z-10 w-24 h-24 md:w-32 md:h-32 rounded-full shadow-[0_0_40px_rgba(59,130,246,0.6)] flex items-center justify-center bg-blue-900 border-2 border-blue-400 overflow-hidden">
                    <svg viewBox="0 0 100 100" class="w-full h-full text-blue-400 opacity-80" fill="currentColor">
                        <!-- Simplified Earth Continents Graphic -->
                        <path d="M 20 20 Q 40 10 60 30 T 90 40 Q 80 80 50 80 T 10 50 Q 0 30 20 20 Z" opacity="0.4"/>
                        <path d="M 10 70 Q 30 60 40 80 T 70 90 Q 50 95 20 90 Z" opacity="0.6"/>
                        <!-- Grid lines to make it look technical -->
                        <path d="M 5 50 Q 50 100 95 50 Q 50 0 5 50" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
                        <path d="M 50 5 Q 100 50 50 95 Q 0 50 50 5" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
                    </svg>
                    <div class="absolute inset-0 bg-gradient-to-tr from-transparent to-white/20 rounded-full"></div>
                </div>

                <!-- Orbiting Path (Dashed ring) -->
                <div class="absolute w-full h-full border border-dashed border-slate-600 rounded-full opacity-50"></div>

                <!-- Rotating Container for Rocket -->
                <div class="absolute w-full h-full animate-spin-slow">
                    <!-- Rocket Container positioned at the top of the rotating ring -->
                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 flex items-center justify-center">
                        <!-- Rocket SVG (Rotated to face the orbit path) -->
                        <div class="relative rotate-90 text-primary drop-shadow-[0_0_10px_rgba(59,130,246,0.8)]">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 md:w-12 md:h-12">
                                <path d="M13.13 22.19L11.5 18.36C13.07 17.88 14.54 17.15 15.86 16.21L18.89 19.24L13.13 22.19ZM5.81 10.86L1.86 12.33L4.81 18.09L7.84 15.06C6.9 13.74 6.17 12.27 5.81 10.86ZM21.16 2.82C21.16 2.82 15.42 1.34 9.11 7.64C7.03 9.72 5.56 12.44 5.22 15.34L2.83 16.14C2.59 16.22 2.45 16.48 2.51 16.73L5.04 22.38C5.13 22.58 5.34 22.69 5.55 22.65L11.23 21.4C11.48 21.35 11.64 21.12 11.64 20.87V20.86C11.64 20.86 11.65 20.86 11.65 20.86L12.56 18.06C15.41 17.7 18.08 16.23 20.14 14.16C26.44 7.86 24.96 2.12 24.96 2.12C24.96 2.12 23.47 2.12 21.16 2.82Z"/>
                            </svg>
                            <!-- Signal Ping Animation -->
                            <div class="signal-beam"></div>
                            <!-- Small blinking dot on rocket tip -->
                            <div class="absolute top-1/2 left-[90%] w-2 h-2 bg-yellow-400 rounded-full transform -translate-y-1/2 animate-pulse shadow-[0_0_10px_yellow]"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Text and Actions Section (Right/Bottom) -->
        <div class="text-center lg:text-left max-w-lg">
            <h1 class="text-7xl md:text-9xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-accent glow-text">404</h1>
            <h2 class="text-2xl md:text-3xl font-semibold mb-4 text-slate-200">Opss, Sinyal Terputus!</h2>
            <p class="text-slate-400 text-base md:text-lg mb-8 leading-relaxed">
                Roket kami sedang mencari halaman yang Anda tuju, namun sepertinya halaman tersebut hilang di ruang hampa. 
                Mari pilih destinasi lain untuk melanjutkan perjalanan.
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row flex-wrap gap-4 justify-center lg:justify-start">
                <!-- KazuDev Utama -->
                <a href="https://kazudev.my.id" class="group relative inline-flex items-center justify-center px-6 py-3 font-semibold text-white transition-all duration-200 bg-primary rounded-xl hover:bg-blue-600 hover:shadow-[0_0_20px_rgba(59,130,246,0.5)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-dark overflow-hidden">
                    <span class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
                    <i class="fa-solid fa-home mr-2 group-hover:-translate-y-1 transition-transform"></i>
                    <span class="relative">KazuDev Utama</span>
                </a>

                <!-- Toko KazuDev -->
                <a href="https://toko.kazudev.my.id" class="group inline-flex items-center justify-center px-6 py-3 font-semibold text-green-400 transition-all duration-200 border-2 border-green-500/30 bg-green-500/10 rounded-xl hover:bg-green-500 hover:text-white hover:border-green-500 hover:shadow-[0_0_20px_rgba(34,197,94,0.4)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 focus:ring-offset-dark">
                    <i class="fa-solid fa-store mr-2 group-hover:scale-110 transition-transform"></i>
                    Toko KazuDev
                </a>

                <!-- Portofolio v1 -->
                <a href="https://tugas.kazudev.my.id" class="group inline-flex items-center justify-center px-6 py-3 font-semibold text-accent transition-all duration-200 border-2 border-accent/30 bg-accent/10 rounded-xl hover:bg-accent hover:text-white hover:border-accent hover:shadow-[0_0_20px_rgba(139,92,246,0.4)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent focus:ring-offset-dark">
                    <i class="fa-solid fa-laptop-code mr-2 group-hover:scale-110 transition-transform"></i>
                    Task Manager
                </a>

                <!-- Sertifikat -->
                <a href="https://kazudev.my.id/sertif" class="group inline-flex items-center justify-center px-6 py-3 font-semibold text-accent transition-all duration-200 border-2 border-accent/30 bg-accent/10 rounded-xl hover:bg-accent hover:text-white hover:border-accent hover:shadow-[0_0_20px_rgba(139,92,246,0.4)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent focus:ring-offset-dark">
                    <i class="fa-solid fa-laptop-code mr-2 group-hover:scale-110 transition-transform"></i>
                    Sertifikat
                </a>

            </div>
        </div>
        
    </div>

</body>
</html>
