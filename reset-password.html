<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - KazuDev Store</title>
    <link rel="icon" type="image/x-icon" href="./dist/img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // SCRIPT ANTI-FLASH: Langsung sinkronkan tema sebelum konten dirender
        (function() {
            const savedTheme = localStorage.getItem('ns_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();

        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans transition-colors duration-300">

    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 border dark:border-gray-700 relative">
        <button onclick="toggleDarkMode()" class="absolute top-4 right-4 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition" id="theme-toggle">
            <i data-lucide="moon" id="theme-icon" class="h-4 w-4"></i>
        </button>

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 dark:bg-blue-900/30 mb-4">
                <i data-lucide="key-round" class="h-8 w-8 text-blue-600 dark:text-blue-400"></i>
            </div>
            <h2 class="text-2xl font-bold">Atur Ulang Password</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Masukkan password baru Anda di bawah ini.</p>
        </div>

        <div id="msg-box" class="hidden mb-6 p-4 rounded-lg text-sm font-medium border"></div>

        <form id="reset-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Password Baru</label>
                <div class="relative">
                    <input type="password" id="new-password" required minlength="6"
                        class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition" 
                        placeholder="••••••••">
                    <i data-lucide="lock" class="absolute left-3 top-3 h-4 w-4 text-gray-400"></i>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition shadow-lg shadow-blue-500/30 flex items-center justify-center group">
                <span id="btn-text">Update Password</span>
                <i data-lucide="check-circle" class="ml-2 h-5 w-5 group-hover:scale-110 transition-transform"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <button onclick="window.location.href='login'" class="text-sm text-gray-400 hover:text-blue-600 transition">
                Kembali ke Login
            </button>
        </div>
    </div>

    <script>
        // Konfigurasi Supabase
        const SUPABASE_URL = 'https://ctkyucpekmzknysvtrqw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a3l1Y3Bla216a255c3Z0cnF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzQ4NzcsImV4cCI6MjA5MjYxMDg3N30.Yhp9i4Mz1AW4cMuWd21c5TABsFHZWfsZYQcnF-X0Pkg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            updateThemeIcon();

            // Cek apakah session tersedia (Supabase otomatis menangani token dari URL)
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    console.log('User sedang dalam mode pemulihan password');
                }
            });
        });

        const resetForm = document.getElementById('reset-form');
        const msgBox = document.getElementById('msg-box');
        const submitBtn = document.getElementById('submit-btn');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;

            // Reset UI
            msgBox.classList.add('hidden');
            submitBtn.disabled = true;
            document.getElementById('btn-text').innerText = "Updating...";

            try {
                // Update password untuk user yang sedang dalam session recovery
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                showMsg("Password berhasil diperbarui! Mengalihkan ke login...", "success");
                
                // Beri jeda sebelum redirect agar user bisa baca pesan sukses
                setTimeout(() => {
                    window.location.href = 'login';
                }, 3000);

            } catch (err) {
                showMsg("Gagal update password: " + err.message, "error");
                submitBtn.disabled = false;
                document.getElementById('btn-text').innerText = "Update Password";
            }
        });

        function showMsg(text, type) {
            msgBox.innerText = text;
            msgBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'border-red-200', 'bg-green-100', 'text-green-700', 'border-green-200');
            
            if (type === "error") {
                msgBox.classList.add('bg-red-100', 'text-red-700', 'border-red-200');
            } else {
                msgBox.classList.add('bg-green-100', 'text-green-700', 'border-green-200');
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ns_theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const iconEl = document.getElementById('theme-icon');
            if (!iconEl) return;
            const isDark = document.documentElement.classList.contains('dark');
            iconEl.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }
    </script>
</body>
</html>
